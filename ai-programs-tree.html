<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Programs of Work</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/tree.css">
</head>
<body>

<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle id="dots-circle" cx="20" cy="20" r="0.7"/>
    </pattern>
    <marker id="dep-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="5" markerHeight="5"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect id="canvas-bg" x="-9999" y="-9999" width="25000" height="25000"/>
  <rect x="-9999" y="-9999" width="25000" height="25000" fill="url(#dots)"/>
  <g id="tg">
    <g id="lg"></g>
    <g id="ng"></g>
  </g>
</svg>

<div id="topbar">
  <div id="top-left">
    <div id="logo-slot" aria-label="Company logo slot">
      <img src="images/logo.png" alt="Company logo"/>
    </div>
  </div>
  <span id="title-text">AI Programs of Work</span>
  <div id="top-right">
    <div class="ctrls">
    <button class="btn icon-btn" id="btn-editmode" aria-label="Enable edit mode" data-tip="Enable edit mode"><i class="fa-solid fa-lock"></i></button>
     <button class="btn btn-red icon-btn" id="btn-add" aria-label="Add node" data-tip="Add node"><i class="fa-solid fa-plus"></i></button>
    <button class="btn icon-btn" id="btn-layout" aria-label="Re-layout tree" data-tip="Re-layout tree"><i class="fa-solid fa-arrows-rotate"></i></button>
    <button class="btn icon-btn" id="btn-json" aria-label="Open JSON import/export" data-tip="JSON import/export"><i class="fa-solid fa-code"></i></button>
    <button class="btn icon-btn" id="btn-fit" aria-label="Fit view" data-tip="Fit view"><i class="fa-solid fa-expand"></i></button>
    <button class="btn icon-btn" id="btn-settings" aria-label="Open settings" data-tip="Settings"><i class="fa-solid fa-gear"></i></button>
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-panel" aria-hidden="true">
  <div class="settings-head">
    <h4>Settings</h4>
    <button class="settings-close" id="settings-close" aria-label="Close settings">×</button>
  </div>
  <div class="settings-body">

    <div class="setting-row">
      <label>Theme</label>
      <div class="seg" id="s-theme">
        <button type="button" data-val="auto">Auto</button>
        <button type="button" data-val="light">Light</button>
        <button type="button" data-val="dark">Dark</button>
      </div>
    </div>

    <div class="setting-group-label">Lines &amp; nodes</div>

    <div class="setting-row">
      <label>Line thickness<span class="val" id="s-line-thickness-val"></span></label>
      <input type="range" id="s-line-thickness" min="0.5" max="2.5" step="0.1"/>
    </div>

    <div class="setting-row">
      <label>Node border<span class="val" id="s-node-border-val"></span></label>
      <input type="range" id="s-node-border" min="0.5" max="2.5" step="0.1"/>
    </div>

    <div class="setting-group-label">Spacing</div>

    <div class="setting-row">
      <label>Vertical gap between siblings<span class="val" id="s-vertical-gap-val"></span></label>
      <input type="range" id="s-vertical-gap" min="30" max="160" step="2"/>
    </div>

    <div class="setting-row">
      <label>Branch distance (horizontal)<span class="val" id="s-side-offset-val"></span></label>
      <input type="range" id="s-side-offset" min="30" max="280" step="5"/>
    </div>

    <div class="setting-row">
      <label>Level spacing (parent → child)<span class="val" id="s-level-gap-val"></span></label>
      <input type="range" id="s-level-gap" min="0.6" max="1.8" step="0.05"/>
    </div>

    <div class="setting-group-label">Branch angle</div>

    <div class="setting-row">
      <label>Horizontal branch drop<span class="val" id="s-side-angle-val"></span></label>
      <input type="range" id="s-side-angle" min="0" max="45" step="1"/>
    </div>

    <div class="settings-actions">
      <button class="m-btn" id="s-reset">Reset defaults</button>
    </div>

  </div>
</div>

<div id="popup">
  <button class="pop-close" id="pop-x">×</button>
  <div class="pop-status" id="pop-status"></div>
  <h3 id="pop-title"></h3>
  <div class="pop-desc" id="pop-desc"></div>
  <div class="pop-section" id="pop-stage-s">
    <div class="pop-sec-lbl">Stage Gates</div>
    <div id="pop-stage-gates" class="stage-gates"></div>
  </div>
  <div class="pop-section" id="pop-eta-s">
    <div class="pop-sec-lbl">Estimated Delivery</div>
    <div id="pop-eta" class="pop-meta"></div>
  </div>
  <div class="pop-section" id="pop-link-s">
    <div class="pop-sec-lbl">Link</div>
    <a id="pop-link" class="pop-link-anchor" href="#" target="_blank" rel="noopener noreferrer"></a>
  </div>
  <div class="pop-section" id="pop-parent-s">
    <div class="pop-sec-lbl">Parent</div>
    <div id="pop-parent"></div>
  </div>
  <div class="pop-section" id="pop-kids-s">
    <div class="pop-sec-lbl">Children</div>
    <div id="pop-kids"></div>
  </div>
  <div class="pop-section" id="pop-deps-s">
    <div class="pop-sec-lbl">Depends On</div>
    <div id="pop-deps"></div>
  </div>
  <div class="pop-section" id="pop-blocks-s">
    <div class="pop-sec-lbl">Enables</div>
    <div id="pop-blocks"></div>
  </div>
  <div class="pop-actions">
    <button class="pop-btn" id="pop-edit">Edit</button>
    <button class="pop-btn" id="pop-addchild">+ Child</button>
    <button class="pop-btn" id="pop-close2">Close</button>
  </div>
</div>

<div id="tree-key">
  <h4>Tree Key</h4>
  <div class="key-row"><div class="key-circle key-circle--done"></div>Done</div>
  <div class="key-row"><div class="key-circle key-circle--prog"></div>In Progress</div>
  <div class="key-row"><div class="key-circle key-circle--plan"></div>Planned</div>
  <div class="key-row"><div class="key-circle key-circle--expl"></div>Exploring</div>
</div>

<div id="zctl">
  <button id="z-out">−</button>
  <span id="z-pct">100%</span>
  <button id="z-in">+</button>
  <button id="z-fit2" title="Fit">⊡</button>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg glass" id="emod">
  <div class="modal">
    <div class="modal-head">
      <h2 id="e-head">Edit Node</h2>
      <button class="m-btn m-btn-ok" id="e-save-top">Save</button>
    </div>
    <div class="fg"><label>Title (use \n for line break)</label><input type="text" id="e-title"/></div>
    <div class="fg"><label>Description</label><textarea id="e-desc"></textarea></div>
    <div class="fg"><label>Status</label>
      <select id="e-status">
        <option value="none">No status</option>
        <option value="done">Done</option>
        <option value="prog">In Progress</option>
        <option value="plan">Planned</option>
        <option value="expl">Exploring</option>
      </select>
    </div>
    <div class="fg"><label>Icon / image path</label><input type="text" id="e-icon" placeholder="emoji, &quot;fa-solid fa-user&quot;, or images/example.png"/></div>
    <div class="fg"><label>Link URL</label><input type="url" id="e-link" placeholder="https://example.com/work-item"/></div>
    <div class="fg"><label>Estimated delivery date</label><input type="date" id="e-eta"/></div>
    <div class="fg">
      <label>Stage gate status</label>
      <div id="e-stage-statuses" class="stage-edit-list"></div>
    </div>
    <div class="fg"><label>Parent</label>
      <select id="e-parent"><option value="">— root —</option></select>
    </div>
    <div class="fg"><label>Child layout (how this node arranges its children)</label>
      <select id="e-child-layout">
        <option value="even">Even — spread horizontally below</option>
        <option value="vertical">Vertical — stacked column below</option>
        <option value="horizontal-right">Horizontal right — branch to the right</option>
        <option value="horizontal-left">Horizontal left — branch to the left</option>
      </select>
    </div>
    <div class="fg"><label>Attach to parent (override parent's child layout for this node)</label>
      <select id="e-attach">
        <option value="">— inherit from parent —</option>
        <option value="even">Even</option>
        <option value="vertical">Vertical</option>
        <option value="horizontal-right">Horizontal right</option>
        <option value="horizontal-left">Horizontal left</option>
      </select>
    </div>
    <div class="fg">
      <label>Cross-stream dependencies (Ctrl/Cmd + click for multi-select)</label>
      <input type="text" id="e-deps-search" placeholder="Type to filter dependency list..."/>
      <select id="e-deps" multiple size="8"></select>
    </div>
    <div class="mf">
      <button class="m-btn m-btn-del" id="e-del">Delete</button>
      <button class="m-btn" id="e-cancel">Cancel</button>
      <button class="m-btn m-btn-ok" id="e-save">Save</button>
    </div>
  </div>
</div>

<!-- JSON MODAL -->
<div class="modal-bg  glass" id="jmod">
  <div class="modal modal-wide">
    <h2>Export / Import JSON</h2>
    <textarea id="jtx" spellcheck="false"></textarea>
    <div class="mf">
      <button class="m-btn" id="j-close">Cancel</button>
      <button class="m-btn" id="j-copy">Copy</button>
      <button class="m-btn m-btn-ok" id="j-apply">Apply JSON</button>
    </div>
  </div>
</div>

<!-- TITLE MODAL -->
<div class="modal-bg glass" id="tmod">
  <div class="modal modal-narrow">
    <h2>Rename</h2>
    <div class="fg fg-top"><label>Title</label><input type="text" id="t-inp"/></div>
    <div class="mf">
      <button class="m-btn" id="t-cancel">Cancel</button>
      <button class="m-btn m-btn-ok" id="t-save">Save</button>
    </div>
  </div>
</div>

<script src="data/tree-data.js"></script>
<script src="js/fontawesome.min.js"></script>
<script src="js/all.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
